<script>
var TERMS = [{"id": "binary", "ch": 1, "term": "Binair", "def": "Een grondtal-2-stelsel dat enkel de cijfers <strong>0</strong> en <strong>1</strong> gebruikt. Elk cijfer wordt een <strong>bit</strong> genoemd. Groepen van 8 bits vormen een <strong>byte</strong>. Binair is de interne taal van alle digitale systemen en de basis voor IP-subnetmaskers en MAC-adressen.", "also": "Binair talstelsel, grondtal 2, base-2"}, {"id": "decimal", "ch": 1, "term": "Decimaal", "def": "Het standaard grondtal-10-stelsel met de cijfers <strong>0–9</strong>. Dit is hoe mensen normaal getallen lezen en schrijven, inclusief IP-adressen in hun puntnotatie (bijv. <code>192.168.1.1</code>).", "also": "Decimaal talstelsel, grondtal 10, base-10"}, {"id": "hexadecimal", "ch": 1, "term": "Hexadecimaal", "def": "Een grondtal-16-stelsel met de cijfers <strong>0–9</strong> en de letters <strong>A–F</strong>, waarbij A=10, B=11, C=12, D=13, E=14, F=15. Eén hex-cijfer stelt exact 4 binaire bits (een nibble) voor. Gebruikt in MAC-adressen en geheugenadressen.", "also": "Hex, grondtal 16, base-16"}, {"id": "bit", "ch": 1, "term": "Bit", "def": "De kleinste eenheid van digitale data — een enkel binair cijfer, ofwel <strong>0</strong> of <strong>1</strong>. 8 bits = 1 byte. Netwerksnelheden worden gemeten in bits per seconde (bps, Mbps, Gbps).", "also": "Binair cijfer, binary digit"}, {"id": "byte", "ch": 1, "term": "Byte", "def": "Een groep van <strong>8 bits</strong>. De standaardeenheid voor het meten van dataopslag en adreslengte. Een MAC-adres is 6 bytes (48 bits). Een IPv4-adres is 4 bytes (32 bits).", "also": "Octet"}, {"id": "nibble", "ch": 1, "term": "Nibble", "def": "Een groep van <strong>4 binaire bits</strong>, gelijk aan exact één hexadecimaal cijfer. Voorbeeld: binair <code>1010</code> = hex <code>A</code> = decimaal <code>10</code>.", "also": "Half-byte, nybble"}, {"id": "octet", "ch": 1, "term": "Octet", "def": "Een andere naam voor een <strong>byte (8 bits)</strong>. In netwerken, met name bij IPv4, wordt elk van de vier secties van een IP-adres gescheiden door punten een octet genoemd. Elke octet heeft een waarde van 0–255.", "also": "Byte"}, {"id": "positional_value", "ch": 1, "term": "Positiewaarde", "def": "De waarde van een cijfer op basis van zijn positie in een getal. In 8-bit binair: posities hebben de waarden <strong>128, 64, 32, 16, 8, 4, 2, 1</strong> (machten van 2 van links naar rechts). Om binair naar decimaal om te zetten, tel je de positiewaarden op waar de bit 1 is.", "also": "Plaatswaarde, positienotatie"}, {"id": "cidr", "ch": 1, "term": "CIDR-notatie", "def": "<strong>Classless Inter-Domain Routing</strong>. Een verkorte schrijfwijze voor subnetmaskers via een schuine streep en het aantal netwerkbits. Voorbeeld: <code>/24</code> = 24 netwerkbits = subnetmasker <code>255.255.255.0</code>. Compacter dan het volledige masker uitschrijven.", "also": "Schuine streep notatie, prefix lengte, slash notatie"}, {"id": "mac", "ch": 2, "term": "MAC-adres", "def": "Een <strong>Media Access Control</strong>-adres — een uniek 48-bit (6-byte) adres dat permanent door de fabrikant aan een NIC wordt toegekend. Geschreven in hex als <code>00:0C:6E:D2:11:E6</code>. Werkt op de datalinkslaag en is enkel geldig binnen een enkel LAN-segment — verandert bij elke router-hop.", "also": "Fysiek adres, hardware-adres, ethernet-adres, burned-in address (BIA)"}, {"id": "oui", "ch": 2, "term": "OUI", "def": "<strong>Organizational Unique Identifier</strong>. De eerste 3 bytes (24 bits) van een MAC-adres, door de IEEE toegekend aan de fabrikant. Voorbeeld: Cisco-toestellen beginnen met <code>00-0C-6E</code>. Opzoeken via ouilookup.com.", "also": "Fabrikantvoorvoegsel, fabrikant-ID"}, {"id": "nic", "ch": 2, "term": "NIC", "def": "<strong>Network Interface Controller</strong> (ook: Network Interface Card, netwerkkaart). Het hardwarecomponent in een toestel dat het verbindt met een netwerk. Elke NIC heeft een uniek MAC-adres ingebrand door de fabrikant. Een router heeft minimaal 2 NIC's nodig.", "also": "Netwerkkaart, netwerkladapter, ethernet-adapter"}, {"id": "eui48", "ch": 2, "term": "EUI-48", "def": "<strong>Extended Unique Identifier — 48 bit</strong>. De IEEE-standaard die het MAC-adresformaat en de toewijzing definieert. Biedt 2⁴⁸ (281 biljard+) unieke adrescombinaties. De eerste 24 bits zijn de OUI; de laatste 24 bits zijn toestelspecifiek.", "also": "IEEE 802 MAC-adresstandaard"}, {"id": "broadcast_mac", "ch": 2, "term": "Broadcast MAC-adres", "def": "Het speciale adres <code>FF:FF:FF:FF:FF:FF</code> — alle 48 bits op 1. Elk frame dat naar dit adres wordt gestuurd, wordt afgeleverd bij <strong>elk toestel op het LAN</strong>. Gebruikt door ARP-verzoeken, DHCP Discover en andere broadcast-protocollen.", "also": "FF:FF:FF:FF:FF:FF, broadcastadres"}, {"id": "getmac", "ch": 2, "term": "getmac", "def": "Een Windows CMD-commando dat de MAC-adres(sen) van alle netwerkadapters op de computer toont. Toont de uitvoer als het veld <strong>Physical Address</strong> in koppeltekennotatie (bijv. <code>B4-B6-86-27-1D-B8</code>).", "also": "getmac-commando"}, {"id": "ipconfig_all", "ch": 2, "term": "ipconfig /all", "def": "Een Windows CMD-commando dat de volledige TCP/IP-configuratie van alle netwerkadapters toont, inclusief: <strong>Physical Address (MAC)</strong>, IP-adres, subnetmasker, default gateway, DNS-servers, DHCP-status en leasetijden.", "also": "ipconfig all"}, {"id": "unicast", "ch": 3, "term": "Unicast", "def": "Een netwerkcommunicatiemodus waarbij data wordt verzonden van <strong>één bron naar exact één bestemming</strong>. Het doel-MAC-adres is het specifieke MAC van de beoogde ontvanger. Het meest voorkomende type netwerkcommunicatie — gebruikt bij surfen, bestandsoverdracht, videobellen.", "also": "Één-op-één communicatie"}, {"id": "multicast", "ch": 3, "term": "Multicast", "def": "Een netwerkcommunicatiemodus waarbij data wordt verzonden van één bron naar een <strong>geabonneerde groep toestellen</strong>. Multicast MAC-adressen beginnen met <code>01-00-5E</code>. IPv4 multicast-IP's gebruiken het Klasse D-bereik: <strong>224.0.0.0 – 239.255.255.255</strong>.", "also": "Één-op-velen communicatie (geabonneerd), groepscommunicatie"}, {"id": "broadcast", "ch": 3, "term": "Broadcast", "def": "Een netwerkcommunicatiemodus waarbij data wordt verzonden naar <strong>ALLE toestellen op het LAN</strong>. Het doel-MAC-adres is <code>FF:FF:FF:FF:FF:FF</code>. Elk toestel moet het frame verwerken. Gebruikt door ARP-verzoeken en DHCP Discover. Overmatige broadcasts kunnen netwerkoverlast veroorzaken.", "also": "Één-op-allen communicatie, uitzending"}, {"id": "ip", "ch": 4, "term": "IP-adres", "def": "Een <strong>logisch 32-bit adres</strong> (IPv4) toegekend aan elke netwerkinterface. Geschreven in decimale puntnotatie als 4 octetten (bijv. <code>192.168.1.50</code>). In tegenstelling tot MAC-adressen zijn IP-adressen logisch — ze kunnen worden gewijzigd en worden toegekend door beheerders of DHCP.", "also": "Internet Protocol-adres, logisch adres, laag-3-adres"}, {"id": "class_a", "ch": 4, "term": "Klasse A", "def": "IPv4-adresklasse met eerste octet-bereik <strong>1–126</strong>. Standaard subnetmasker: <code>255.0.0.0</code> (/8). Ondersteunt tot 16.777.214 hosts per netwerk. Privaat bereik: <code>10.0.0.0 – 10.255.255.255</code>.", "also": ""}, {"id": "class_b", "ch": 4, "term": "Klasse B", "def": "IPv4-adresklasse met eerste octet-bereik <strong>128–191</strong>. Standaard subnetmasker: <code>255.255.0.0</code> (/16). Ondersteunt tot 65.534 hosts per netwerk. Privaat bereik: <code>172.16.0.0 – 172.31.255.255</code>.", "also": ""}, {"id": "class_c", "ch": 4, "term": "Klasse C", "def": "IPv4-adresklasse met eerste octet-bereik <strong>192–223</strong>. Standaard subnetmasker: <code>255.255.255.0</code> (/24). Ondersteunt tot 254 hosts per netwerk. Privaat bereik: <code>192.168.0.0 – 192.168.255.255</code>.", "also": ""}, {"id": "class_d", "ch": 4, "term": "Klasse D", "def": "IPv4-adresklasse gereserveerd voor <strong>multicast</strong>. Eerste octet-bereik: <strong>224–239</strong>. Niet gebruikt voor gewone hostadressering — geen subnetmasker of hostenaantal. Multicast-groepen abonneren op adressen in dit bereik.", "also": "Multicast-bereik"}, {"id": "network_id", "ch": 4, "term": "Netwerk-ID", "def": "Het adres dat een netwerk identificeert — gevonden door het <strong>hostgedeelte van een IP-adres op allemaal nullen</strong> in te stellen. Kan NIET aan een host worden toegekend. Voorbeeld: voor <code>192.168.50.112/24</code> is het Netwerk-ID <code>192.168.50.0</code>.", "also": "Netwerkadres, netwerkidentificator"}, {"id": "broadcast_addr", "ch": 4, "term": "Broadcastadres", "def": "Het hoogste adres in een subnet — gevonden door het <strong>hostgedeelte op allemaal enen (255)</strong> in te stellen. Frames die naar dit adres worden gestuurd, bereiken alle hosts in het subnet. Kan NIET aan een host worden toegekend. Voorbeeld: voor <code>192.168.50.0/24</code> is het broadcastadres <code>192.168.50.255</code>.", "also": "Gerichte broadcast"}, {"id": "subnet_mask", "ch": 4, "term": "Subnetmasker", "def": "Een 32-bit waarde die een IP-adres opsplitst in zijn <strong>netwerkgedeelte</strong> (bits = 1) en <strong>hostgedeelte</strong> (bits = 0). Bestaat altijd uit aaneengesloten enen gevolgd door nullen. Voorbeeld: <code>255.255.255.0</code> = /24 = 24 netwerkbits.", "also": "Netwerkmasker, netmasker"}, {"id": "private_ip", "ch": 4, "term": "Privaat IP-adres", "def": "IP-adressen gereserveerd voor gebruik binnen privénetwerken — <strong>niet routeerbaar op het publieke internet</strong>. Drie privéreeksen: Klasse A: <code>10.0.0.0/8</code>, Klasse B: <code>172.16.0.0/12</code>, Klasse C: <code>192.168.0.0/16</code>. Vereisen NAT om het internet te bereiken.", "also": "RFC 1918-adressen, niet-routeerbare adressen"}, {"id": "public_ip", "ch": 4, "term": "Publiek IP-adres", "def": "Een IP-adres dat <strong>wereldwijd uniek en routeerbaar is op het internet</strong>. Toegekend door internetproviders (ISP's). Alle internetgerichte servers hebben publieke IP's. Toestellen in een LAN delen één publiek IP via NAT.", "also": "Globaal IP, routeerbaar IP"}, {"id": "loopback", "ch": 4, "term": "Loopback-adres", "def": "Het adresbereik <strong>127.0.0.0 – 127.255.255.255</strong>, meest gebruikt als <code>127.0.0.1</code>. Gebruikt om de lokale TCP/IP-stack te testen zonder data over het netwerk te sturen. Pingen van 127.0.0.1 test of TCP/IP werkt op het lokale toestel. NIET toewijsbaar aan een netwerkapparaat.", "also": "localhost, 127.0.0.1"}, {"id": "apipa", "ch": 4, "term": "APIPA", "def": "<strong>Automatic Private IP Addressing</strong>. Wanneer een Windows-toestel geen DHCP-server kan bereiken, kent het zichzelf automatisch een adres toe in het bereik <code>169.254.0.1 – 169.254.255.254</code> met masker <code>255.255.0.0</code>. APIPA-toestellen kunnen communiceren met andere APIPA-toestellen op het LAN maar kunnen het internet NIET bereiken.", "also": "Link-local adres, 169.254.x.x"}, {"id": "dhcp", "ch": 4, "term": "DHCP", "def": "<strong>Dynamic Host Configuration Protocol</strong>. Kent automatisch TCP/IP-configuratie toe aan toestellen. Voorziet 4 instellingen: IP-adres, subnetmasker, default gateway, DNS-server. Gebruikt UDP-poorten 67 (server) en 68 (client). Proces: <strong>Discover → Offer → Request → Acknowledge</strong>. Toewijzingen hebben een leaseperiode en zijn tijdelijk.", "also": "Dynamic Host Configuration Protocol, dynamische IP-toewijzing"}, {"id": "static_ip", "ch": 4, "term": "Statisch IP-adres", "def": "Een handmatig geconfigureerd, permanent IP-adres dat niet verandert tenzij handmatig bijgewerkt. Gebruikt voor servers, printers, routers en andere toestellen die een consistent adres nodig hebben. Ingesteld via <code>ncpa.cpl</code> in Windows.", "also": "Vast IP, manueel IP"}, {"id": "ncpa_cpl", "ch": 4, "term": "ncpa.cpl", "def": "Een Windows Run-commando dat het configuratiescherm <strong>Netwerkverbindingen</strong> opent. Gebruikt om statische IP-adressen in te stellen, adapterinstellingen te bekijken en adapters in- of uitgeschakelen. Typ in de zoekbalk van het Startmenu of via Win+R.", "also": "Netwerkverbindingen paneel"}, {"id": "port", "ch": 5, "term": "Poort", "def": "Een 16-bit getal (0–65535) dat een specifieke <strong>toepassing of dienst</strong> op een toestel identificeert. Een IP-adres identificeert het toestel; een poort identificeert de dienst. Samen vormen ze een <strong>socket</strong>. Totaal mogelijke poorten: 2¹⁶ = <strong>65.536</strong>.", "also": "Poortnummer, TCP/UDP-poort"}, {"id": "socket", "ch": 5, "term": "Socket", "def": "De combinatie van een <strong>IP-adres + poortnummer</strong> (bijv. <code>192.168.1.50:80</code>). Identificeert uniek een specifieke dienst op een specifiek toestel. Een netwerkverbinding gebruikt twee sockets: één aan de clientzijde en één aan de serverzijde.", "also": "Netwerksocket, eindpunt"}, {"id": "well_known_ports", "ch": 5, "term": "Bekende Poorten", "def": "Poortnummers in het bereik <strong>0–1023</strong>, door IANA toegekend aan fundamentele internetdiensten. Voorbeelden: HTTP=80, HTTPS=443, FTP=21, SSH=22, SMTP=25, DNS=53, DHCP=67/68. Kunnen niet worden gebruikt door gewone toepassingen zonder beheerderrechten.", "also": "Systeempoorten, IANA-poorten, well-known ports"}, {"id": "tcp", "ch": 5, "term": "TCP", "def": "<strong>Transmission Control Protocol</strong>. Een verbindingsgericht transportprotocol dat <strong>betrouwbare, geordende levering</strong> biedt. Bouwt een verbinding op (3-way handshake) voor het data verstuurt en controleert of alle data correct aankomt. Trager dan UDP maar betrouwbaar. Gebruikt door HTTP, HTTPS, FTP, SSH, SMTP, RDP.", "also": "Transmission Control Protocol, betrouwbaar transport"}, {"id": "udp", "ch": 5, "term": "UDP", "def": "<strong>User Datagram Protocol</strong>. Een verbindingsloos transportprotocol <strong>zonder foutcontrole of gegarandeerde levering</strong>. Sneller dan TCP. Gebruikt waar snelheid belangrijker is dan betrouwbaarheid: DNS, DHCP, videostreaming, gaming. DNS gebruikt UDP 53; DHCP gebruikt UDP 67/68.", "also": "User Datagram Protocol, snel transport, onbetrouwbaar transport"}, {"id": "http_port", "ch": 5, "term": "HTTP (Poort 80)", "def": "<strong>Hypertext Transfer Protocol</strong>. Het protocol voor het overdragen van webpagina's tussen browser en webserver. Gebruikt <strong>TCP poort 80</strong>. Niet versleuteld — alle data wordt als leesbare tekst verstuurd. Vervangen door HTTPS (poort 443) voor beveiligde verbindingen.", "also": "Poort 80, webprotocol"}, {"id": "https_port", "ch": 5, "term": "HTTPS (Poort 443)", "def": "<strong>HTTP Secure</strong>. Versleutelde versie van HTTP via TLS/SSL. Gebruikt <strong>TCP poort 443</strong>. Alle data tussen browser en server is versleuteld, wat afluisteren verhindert. Standaard voor alle moderne websites.", "also": "Poort 443, beveiligd web, HTTP over TLS"}, {"id": "dns_port", "ch": 5, "term": "DNS (Poort 53)", "def": "<strong>Domain Name System</strong>. Vertaalt domeinnamen naar IP-adressen. Gebruikt <strong>UDP poort 53</strong> (belangrijk: UDP, niet TCP). Een DNS-zoekopdracht vraagt: 'Wat is het IP-adres voor www.encora.be?' en de DNS-server antwoordt met het IP.", "also": "Poort 53, domeinnaamresolutie"}, {"id": "dhcp_port", "ch": 5, "term": "DHCP (Poorten 67/68)", "def": "<strong>Dynamic Host Configuration Protocol</strong>. Gebruikt <strong>UDP poort 67</strong> (server luistert) en <strong>UDP poort 68</strong> (client luistert). Belangrijk: gebruikt UDP, niet TCP. Beide poorten moeten open zijn voor een correcte DHCP-werking.", "also": "Poort 67, poort 68"}, {"id": "ftp_port", "ch": 5, "term": "FTP (Poort 21)", "def": "<strong>File Transfer Protocol</strong>. Gebruikt voor bestandsoverdracht tussen client en server. Gebruikt <strong>TCP poort 21</strong> voor besturingscommando's en TCP poort 20 voor gegevensoverdracht. Niet versleuteld — SFTP (poort 22) of FTPS zijn de beveiligde alternatieven.", "also": "Poort 21, bestandsoverdracht"}, {"id": "ssh_port", "ch": 5, "term": "SSH (Poort 22)", "def": "<strong>Secure Shell</strong>. Biedt versleutelde externe opdrachtregel-toegang tot een toestel. Gebruikt <strong>TCP poort 22</strong>. Verving Telnet (poort 23) als standaard voor extern beheer omdat al het verkeer versleuteld is.", "also": "Poort 22, Secure Shell, externe toegang"}, {"id": "smtp_port", "ch": 5, "term": "SMTP (Poort 25)", "def": "<strong>Simple Mail Transfer Protocol</strong>. Gebruikt voor het verzenden van e-mails tussen mailservers en van e-mailclients naar servers. Gebruikt <strong>TCP poort 25</strong>.", "also": "Poort 25, e-mailverzendprotocol"}, {"id": "smb_port", "ch": 5, "term": "SMB (Poort 445)", "def": "<strong>Server Message Block</strong>. Protocol voor Windows-bestandsdeling, printerdeling en toegang tot netwerkbronnen. Gebruikt <strong>TCP poort 445</strong>. Laat Windows-computers toe bestanden en printers te delen over een netwerk.", "also": "Poort 445, Windows bestandsdeling"}, {"id": "rdp_port", "ch": 5, "term": "RDP (Poort 3389)", "def": "<strong>Remote Desktop Protocol</strong>. Laat een gebruiker toe om het bureaublad van een andere computer op afstand te bedienen via het netwerk. Gebruikt <strong>TCP poort 3389</strong>. Ingebouwd in Windows als Verbinding met extern bureaublad.", "also": "Poort 3389, Remote Desktop Protocol, extern bureaublad"}, {"id": "telnet_port", "ch": 5, "term": "Telnet (Poort 23)", "def": "Een ouder protocol voor externe toegang dat opdrachtregel-toegang tot toestellen biedt. Gebruikt <strong>TCP poort 23</strong>. Volledig <strong>onversleuteld</strong> — alle data inclusief wachtwoorden wordt als leesbare tekst verstuurd. Vervangen door SSH (poort 22).", "also": "Poort 23, teletype network"}, {"id": "iana", "ch": 5, "term": "IANA", "def": "<strong>Internet Assigned Numbers Authority</strong>. De organisatie die wereldwijd standaard poortnummers, IP-adresbereiken en protocolnummers beheert. Houdt het officiële register bij van bekende poorten (0–1023).", "also": "Internet Assigned Numbers Authority"}, {"id": "netstat", "ch": 5, "term": "netstat -an", "def": "Een Windows CMD-commando dat alle <strong>actieve netwerkverbindingen en luisterende poorten</strong> toont. Toont: protocol (TCP/UDP), lokaal adres en poort, extern adres en poort, en verbindingsstatus (LISTENING, ESTABLISHED, enz.).", "also": "netstat, netwerkstatistieken"}, {"id": "arp", "ch": 6, "term": "ARP", "def": "<strong>Address Resolution Protocol</strong>. Zet IP-adressen om naar MAC-adressen binnen een LAN. Wanneer een toestel een doel-IP kent maar niet het MAC, stuurt het een ARP-verzoek (broadcast). Het doeltoestel antwoordt met een unicast ARP-antwoord met zijn MAC. <strong>ARP is het eerste protocol dat actief wordt wanneer twee LAN-hosts communiceren.</strong>", "also": "Address Resolution Protocol, adresresolutieprotocol"}, {"id": "arp_request", "ch": 6, "term": "ARP-verzoek", "def": "Een <strong>broadcast</strong>-frame verstuurd naar <code>FF:FF:FF:FF:FF:FF</code> met de vraag 'Wie heeft IP x.x.x.x? Vertel [mijn IP].' Alle toestellen op het LAN ontvangen het. Enkel het toestel met het overeenkomstige IP antwoordt. Bevat het IP en MAC van de afzender.", "also": "ARP broadcast, ARP request"}, {"id": "arp_reply", "ch": 6, "term": "ARP-antwoord", "def": "Een <strong>unicast</strong>-frame rechtstreeks verstuurd van het doeltoestel naar de aanvrager. Bevat het MAC-adres van het doeltoestel. Na ontvangst voegt de aanvrager de IP-naar-MAC-koppeling toe aan zijn ARP-tabel en kan nu rechtstreeks frames sturen.", "also": "ARP response, ARP unicast, ARP reply"}, {"id": "arp_table", "ch": 6, "term": "ARP-tabel", "def": "Een cache opgeslagen in elk toestel die <strong>IP-adressen aan MAC-adressen</strong> koppelt. Voorkomt herhaalde ARP-verzoeken voor bekende toestellen. Bekijken met <code>arp -a</code>. Wissen met <code>arp -d *</code>. Vermeldingen zijn dynamisch (geleerd via ARP) of statisch (handmatig toegevoegd).", "also": "ARP-cache, ARP-cachetabel, ARP table"}, {"id": "garp", "ch": 6, "term": "GARP", "def": "<strong>Gratuitous ARP</strong>. Een ARP-antwoord verstuurd <strong>zonder voorafgaand ARP-verzoek</strong>. Gebruikt om: (1) een nieuw toestel aan te kondigen op het netwerk, (2) de ARP-tabellen van andere toestellen bij te werken na een failover of IP-wijziging. Verschijnt als <strong>'ARP Probe'</strong> in Wireshark.", "also": "Gratuitous ARP, ARP Probe (in Wireshark), ongevraagde ARP"}, {"id": "icmp", "ch": 6, "term": "ICMP", "def": "<strong>Internet Control Message Protocol</strong>. Verstuurt diagnostische en foutberichten in IP-netwerken. Draagt geen toepassingsdata — enkel controlemeldingen. Gebruikt door <code>ping</code> (echo-verzoek/-antwoord) en <code>tracert</code> (TTL-verlopen berichten). Werkt op de internetlaag.", "also": "Internet Control Message Protocol, ping-protocol"}, {"id": "ping", "ch": 6, "term": "ping", "def": "Een CMD-commando dat de netwerkreikbaarheid test via ICMP echo-verzoeken. Standaard: verstuurt <strong>4 pakketten van 32 bytes</strong>. Opties: <code>ping -t</code> (continu), <code>ping -4</code> (forceer IPv4), <code>ping -6</code> (forceer IPv6). Sterretjes (*) in de uitvoer betekenen dat ICMP geblokkeerd is — NIET noodzakelijk dat het toestel offline is.", "also": "ICMP echo-verzoek, ping-commando"}, {"id": "tracert", "ch": 6, "term": "tracert", "def": "Een Windows CMD-commando dat de <strong>route van pakketten</strong> naar een bestemming toont, met vermelding van elke router-hop. Gebruikt ICMP met oplopende TTL-waarden. Handig voor het diagnosticeren waar een verbinding hapert of traag is. Linux-equivalent: <code>traceroute</code>.", "also": "traceroute, route tracing, hop-tracering"}, {"id": "hub", "ch": 7, "term": "Hub", "def": "Een Laag-1-netwerkapparaat dat meerdere toestellen verbindt. Wanneer het een frame ontvangt, <strong>stuurt het naar ALLE poorten</strong>, ongeacht het doel-MAC. Heeft geen enkele intelligentie. Veroorzaakt overmatig verkeer en botsingen. <strong>Verouderd — volledig vervangen door switches.</strong>", "also": "Ethernet-hub, domme switch"}, {"id": "switch", "ch": 7, "term": "Switch", "def": "Een Laag-2-intelligent netwerkapparaat dat toestellen in een LAN verbindt. Onderhoudt een <strong>MAC-adrestabel</strong> (geleerd door verkeer te observeren) en stuurt frames enkel naar de <strong>juiste doelpoort</strong>. Elimineert onnodig verkeer en botsingen. Kan onbeheerd (plug-and-play) of beheerd (configureerbaar via CLI) zijn.", "also": "Ethernet-switch, laag-2-switch, netwerkswitch"}, {"id": "managed_switch", "ch": 7, "term": "Beheerde Switch", "def": "Een switch die kan worden geconfigureerd via <strong>CLI of webinterface</strong>. Ondersteunt geavanceerde functies: poortsnelheidsinstellingen, poortbeveiliging, VLAN's, linkaggregatie, spanning tree. Gebruikt in bedrijfsnetwerken waar fijnere controle vereist is.", "also": "Intelligente switch, configureerbare switch, managed switch"}, {"id": "router", "ch": 7, "term": "Router", "def": "Een Laag-3-apparaat dat <strong>twee of meer verschillende IP-netwerken verbindt</strong> en pakketten tussen hen routeert. Heeft minimaal 2 NIC's (LAN en WAN). Neemt routeringsbeslissingen op basis van IP-adressen (niet MAC-adressen). Het LAN-kant IP is de Default Gateway voor alle toestellen.", "also": "Laag-3-apparaat, gateway"}, {"id": "default_gateway", "ch": 7, "term": "Default Gateway", "def": "Het <strong>LAN-kant IP-adres van de router</strong>. Wanneer een toestel verkeer wil sturen naar een ander netwerk (bijv. het internet), stuurt het het pakket naar de Default Gateway. De router stuurt het dan door via zijn WAN-interface. Geconfigureerd als onderdeel van de TCP/IP-instellingen.", "also": "Gateway, router-IP, volgende hop"}, {"id": "straight_through", "ch": 7, "term": "Doorverbindingskabel", "def": "Een Ethernet-kabel waarbij beide uiteinden <strong>dezelfde bedrading</strong> gebruiken. Gebruikt om <strong>MDI- naar MDIX-toestellen</strong> te verbinden — typisch pc naar switch, of pc naar router. Het meest voorkomende kabeltype in moderne netwerken.", "also": "Patchkabel, straight-through kabel, rechte kabel"}, {"id": "crossover", "ch": 7, "term": "Kruiskabel", "def": "Een Ethernet-kabel waarbij de zend- en ontvangstparen <strong>omgewisseld zijn tussen de uiteinden</strong>. Gebruikt om <strong>gelijksoortige toestellen</strong> te verbinden: switch naar switch, pc naar pc. Grotendeels vervangen door Auto-MDI/MDIX, dat automatisch het benodigde kabeltype detecteert.", "also": "MDI-MDI-kabel, gecruiste kabel, crossover kabel"}, {"id": "auto_mdix", "ch": 7, "term": "Auto-MDI/MDIX", "def": "Een functie op moderne netwerkapparaten die <strong>automatisch detecteert</strong> of een doorverbindingskabel of kruiskabel is aangesloten en de poort dienovereenkomstig aanpast. Elimineert de noodzaak om je zorgen te maken over het kabeltype — beide typen werken.", "also": "Automatische herkenning, automatische crossover"}, {"id": "dns", "ch": 7, "term": "DNS", "def": "<strong>Domain Name System</strong>. Een gedistribueerde database die mensleesbare <strong>domeinnamen vertaalt naar IP-adressen</strong> (directe opzoeking) en IP-adressen naar domeinnamen (omgekeerde opzoeking). Zonder DNS zouden gebruikers IP-adressen moeten onthouden voor elke website.", "also": "Domain Name System, naamresolutie"}, {"id": "a_record", "ch": 7, "term": "A-record", "def": "Een DNS-recordtype dat een <strong>hostnaam koppelt aan een IPv4-adres</strong>. Voorbeeld: <code>www.encora.be → 212.123.0.115</code>. Het meest fundamentele DNS-recordtype — elke website heeft er een nodig om toegankelijk te zijn via naam.", "also": "Adresrecord, IPv4-record"}, {"id": "cname", "ch": 7, "term": "CNAME-record", "def": "<strong>Canonical Name</strong>-record. Een DNS-record dat één domeinnaam aan een andere domeinnaam (een alias) koppelt. Voorbeeld: <code>mail.encora.be → encora.be</code>. Gebruikt om aliassen te maken die verwijzen naar een canonieke (officiële) hostnaam.", "also": "Canonical Name-record, aliasrecord"}, {"id": "fqdn", "ch": 7, "term": "FQDN", "def": "<strong>Fully Qualified Domain Name</strong>. De volledige, ondubbelzinnige domeinnaam van een host, die zijn exacte locatie in de DNS-hiërarchie aangeeft. Onderdelen: <strong>hostnaam + domeinnaam + TLD</strong>. Voorbeeld: <code>mailserver.encora.be</code> (hostnaam: mailserver, domein: encora, TLD: .be).", "also": "Fully Qualified Domain Name, volledige domeinnaam"}, {"id": "dhcp_process", "ch": 7, "term": "DHCP-proces (DORA)", "def": "Het vierstapsproces voor automatische IP-toewijzing: <strong>D</strong>iscover (client broadcast op zoek naar DHCP-server), <strong>O</strong>ffer (server biedt een beschikbaar IP aan), <strong>R</strong>equest (client accepteert het aanbod), <strong>A</strong>cknowledge (server bevestigt de toewijzing). Alle vier stappen moeten worden voltooid voor een succesvolle IP-configuratie.", "also": "DORA, DHCP-handshake, DHCP-onderhandeling"}, {"id": "lease_time", "ch": 7, "term": "Leaseperiode", "def": "De duur gedurende welke een DHCP-toegewezen IP-adres geldig is. Wanneer de lease verloopt, vraagt het toestel automatisch een verlenging aan. Als de DHCP-server niet beschikbaar is bij verlenging, kan het toestel zijn IP-configuratie verliezen en terugvallen op APIPA.", "also": "DHCP-lease, IP-lease, leasetijd"}, {"id": "packet_tracer", "ch": 8, "term": "Cisco Packet Tracer", "def": "Een <strong>netwerksimulatieprogramma</strong> van Cisco. Laat toe virtuele netwerken te bouwen, configureren en testen zonder fysieke hardware. Gratis beschikbaar op <strong>skillsforall.com</strong>. Ondersteunt routers, switches, pc's, servers en kabels. Bestanden gebruiken de <strong>.pkt</strong>-extensie.", "also": "PT, Packet Tracer"}, {"id": "simulation_mode", "ch": 8, "term": "Simulatiemodus", "def": "Een Packet Tracer-modus die <strong>stap voor stap toont hoe data door het netwerk reist</strong>. Pakketten worden gevisualiseerd als enveloppen. Gebruik Edit Filters om te selecteren welke protocollen worden weergegeven (bijv. enkel ARP en ICMP). Klik op de afspeeldriehoek om één stap vooruit te gaan.", "also": "PT-simulatie, stap-voor-stap modus"}, {"id": "fast_forward", "ch": 8, "term": "Snel Vooruitspoelen", "def": "Een Packet Tracer-knop die de <strong>initialisatiewachttijd overslaat</strong> en oranje koppelingsindicatoren omzet naar groen (actief). Moet worden geklikt na het verbinden van kabels en voor het testen van connectiviteit. Essentiële stap bij het opzetten van elk Packet Tracer-netwerk.", "also": "Fast Forward, PT snel vooruitspoelen"}, {"id": "pkt_file", "ch": 8, "term": ".pkt-bestand", "def": "De bestandsextensie die <strong>Cisco Packet Tracer</strong> gebruikt om netwerktopologiebestanden op te slaan. Bevat het volledige netwerkontwerp inclusief toestellen, kabels, configuraties en IP-instellingen. Naamgevingsconventie voor BSN: <code>Voornaam_OEF1_ARP_ICMP.pkt</code>.", "also": "Packet Tracer-bestand, PT-bestand"}, {"id": "link_status", "ch": 8, "term": "Koppelingstatusindicatoren", "def": "Gekleurde punten in Packet Tracer die de kabelverbindingsstatus aangeven: <strong>Groen</strong> = verbonden en actief, <strong>Oranje</strong> = nog niet actief (klik Snel Vooruitspoelen), <strong>Rood</strong> = geen verbinding (controleer kabel en poorten).", "also": "PT-koppelingsindicatoren, verbindingspunten"}, {"id": "tcpip_model", "ch": 9, "term": "TCP/IP-model", "def": "Een <strong>praktisch 4-lagennetworkmodel</strong> dat beschrijft hoe internetcommunicatie werkelijk verloopt. Lagen (van boven naar onder): Toepassing (Data), Transport (Segment), Internet (Pakket), Netwerktoegang (Frame). Gebaseerd op echte protocollen — in tegenstelling tot het theoretische 7-lagenmodel OSI.", "also": "Internetmodel, DoD-model, 4-lagenmodel"}, {"id": "application_layer", "ch": 9, "term": "Toepassingslaag", "def": "De bovenste laag (Laag 4) van het TCP/IP-model. Hier werken eindgebruikerstoepassingen en protocollen op hoog niveau. <strong>PDU = Data</strong>. Protocollen: HTTP, HTTPS, FTP, DNS, SMTP, SSH, RDP. Dit is waar de data van de gebruiker ontstaat.", "also": "Laag 4 TCP/IP, bovenste laag, Application Layer"}, {"id": "transport_layer", "ch": 9, "term": "Transportlaag", "def": "Laag 3 van het TCP/IP-model. Behandelt <strong>poortgebaseerde adressering en betrouwbare levering</strong>. <strong>PDU = Segment</strong>. Protocollen: TCP (betrouwbaar) en UDP (snel). Voegt bron- en doelpoortnummers toe aan de data-header.", "also": "Laag 3 TCP/IP, Transport Layer"}, {"id": "internet_layer", "ch": 9, "term": "Internetlaag", "def": "Laag 2 van het TCP/IP-model. Behandelt <strong>IP-adressering en routering tussen netwerken</strong>. <strong>PDU = Pakket</strong>. Protocollen: IP, ICMP, ARP. Routers werken op deze laag. Voegt bron- en doel-IP-adressen toe.", "also": "Laag 2 TCP/IP, netwerklaag, Internet Layer"}, {"id": "network_access_layer", "ch": 9, "term": "Netwerktoegangslaag", "def": "De onderste laag (Laag 1) van het TCP/IP-model. Behandelt <strong>fysieke transmissie</strong>: NIC's, kabels, switches. <strong>PDU = Frame</strong>. Protocollen: Ethernet, Wi-Fi. Voegt bron- en doel-MAC-adressen en een CRC-afsluiting toe voor foutdetectie.", "also": "Laag 1 TCP/IP, datalink + fysieke laag, Network Access Layer"}, {"id": "pdu", "ch": 9, "term": "PDU", "def": "<strong>Protocol Data Unit</strong>. De naam die aan data wordt gegeven op elke TCP/IP-laag terwijl headers worden toegevoegd of verwijderd. Omlaag in de stack (verzenden): Data → Segment → Pakket → Frame. Omhoog in de stack (ontvangen): Frame → Pakket → Segment → Data.", "also": "Protocol Data Unit, data-eenheid"}, {"id": "frame", "ch": 9, "term": "Frame", "def": "De PDU op de <strong>Netwerktoegangslaag</strong> (Laag 1 TCP/IP). Een Ethernet-frame bevat: doel-MAC, bron-MAC, typeveld, payload (IP-pakket) en CRC-afsluiting. Wordt aangemaakt wanneer het IP-pakket van de Internetlaag wordt doorgegeven aan de Netwerktoegangslaag.", "also": "Ethernet-frame, L1-PDU, datalink-frame"}, {"id": "packet_pdu", "ch": 9, "term": "Pakket", "def": "De PDU op de <strong>Internetlaag</strong> (Laag 2 TCP/IP). Een IP-pakket bevat: bron-IP-adres, doel-IP-adres, TTL, protocolveld en payload (TCP/UDP-segment). Routers sturen pakketten door op basis van hun doel-IP.", "also": "IP-pakket, L2-PDU, datagram"}, {"id": "segment", "ch": 9, "term": "Segment", "def": "De PDU op de <strong>Transportlaag</strong> (Laag 3 TCP/IP). Een TCP/UDP-segment bevat: bronpoort, doelpoort, volgnummer (TCP) en payload (toepassingsdata). Het segment wordt doorgegeven aan de Internetlaag om een pakket te worden.", "also": "TCP-segment, UDP-datagram, L3-PDU"}, {"id": "encapsulation", "ch": 9, "term": "Inkapseling", "def": "Het proces van <strong>protocolheaders toevoegen</strong> op elke laag terwijl data OMLAAG beweegt in de TCP/IP-stack tijdens verzending. Toepassingsdata krijgt een Transportheader (segment), daarna een Internetheader (pakket), daarna een Netwerktoegangsheader+afsluiting (frame). Elke laag wikkelt de data van de laag erboven in.", "also": "Data-inkapseling, verpakken, encapsulation"}, {"id": "decapsulation", "ch": 9, "term": "Ontkapseling", "def": "Het omgekeerde van inkapseling. Terwijl data <strong>OMHOOG beweegt in de TCP/IP-stack</strong> op het ontvangende toestel, verwijdert elke laag zijn header en geeft de resterende data door. Frame → verwijder MAC-header → Pakket → verwijder IP-header → Segment → verwijder poortheader → Data.", "also": "Uitpakken, de-inkapseling, decapsulation"}, {"id": "nat", "ch": 9, "term": "NAT", "def": "<strong>Network Address Translation</strong>. Laat meerdere toestellen met privé IP-adressen toe om één enkel publiek IP-adres te delen voor internettoegang. Uitgevoerd door de <strong>randrouter</strong> aan de LAN/internet-grens. Uitgaand: vervangt privé bron-IP door publiek IP van de router. Inkomend: raadpleegt de NAT-tabel en stuurt door naar het juiste toestel.", "also": "Network Address Translation, IP-maskering"}, {"id": "edge_router", "ch": 9, "term": "Randrouter", "def": "Een router gepositioneerd op de <strong>grens tussen een privé LAN en het publieke internet</strong>. Voert NAT uit als gateway tussen de privé en publieke adreswerelden. Al het internetgebonden verkeer passeert de randrouter. Ook wel NAT-router of grensrouter genoemd.", "also": "NAT-router, grensrouter, Edge Router"}, {"id": "osi_model", "ch": 9, "term": "OSI-model", "def": "Het <strong>Open Systems Interconnection</strong>-model — een theoretisch 7-lagenraamwerk voor het begrijpen van netwerkcommunicatie. Lagen: Fysiek, Datalink, Netwerk, Transport, Sessie, Presentatie, Toepassing. Vergelijk met het TCP/IP-model dat praktisch is en slechts 4 lagen heeft.", "also": "Open Systems Interconnection, 7-lagenmodel"}];

var activeCh = 0;
var sortAZ = true;

function init(){
  buildPills();
  render();
}

function buildPills(){
  var CHS = [
    {id:1,label:'H.1 Talstelsels',color:'#4f8ef7'},
    {id:2,label:'H.2 MAC',color:'#22d3a5'},
    {id:3,label:'H.3 Comm.',color:'#f97316'},
    {id:4,label:'H.4 TCP/IP',color:'#e879f9'},
    {id:5,label:'H.5 Poorten',color:'#facc15'},
    {id:6,label:'H.6 ARP & ICMP',color:'#f43f5e'},
    {id:7,label:'H.7 Toestellen',color:'#a78bfa'},
    {id:8,label:'H.8 PT',color:'#38bdf8'},
    {id:9,label:'H.9 NAT',color:'#fb923c'},
  ];
  var h = '<div class="fpill active" id="pill_0" onclick="setCh(0)">Alle</div>';
  for(var i=0;i<CHS.length;i++){
    var c=CHS[i];
    h += '<div class="fpill" id="pill_'+c.id+'" onclick="setCh('+c.id+')" style="border-color:'+c.color+'33">'+c.label+'</div>';
  }
  document.getElementById('filterPills').innerHTML = h;
}

var CH_COLORS = {1:'#4f8ef7',2:'#22d3a5',3:'#f97316',4:'#e879f9',5:'#facc15',6:'#f43f5e',7:'#a78bfa',8:'#38bdf8',9:'#fb923c'};

function setCh(id){
  activeCh = id;
  var pills = document.querySelectorAll('.fpill');
  for(var i=0;i<pills.length;i++) pills[i].classList.remove('active');
  var p = document.getElementById('pill_'+id);
  if(p) p.classList.add('active');
  render();
}

function toggleSort(){
  sortAZ = !sortAZ;
  var btn = document.getElementById('sortBtn');
  if(btn){
    btn.textContent = sortAZ ? 'A\u2013Z' : 'Z\u2013A';
    btn.classList.toggle('active', !sortAZ);
  }
  render();
}

function render(){
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var filtered = [];
  for(var i=0;i<TERMS.length;i++){
    var t = TERMS[i];
    if(activeCh && t.ch !== activeCh) continue;
    if(q){
      var hay = (t.term+' '+t.def+' '+(t.also||'')).toLowerCase();
      if(hay.indexOf(q) < 0) continue;
    }
    filtered.push(t);
  }
  filtered.sort(function(a,b){
    var r = a.term.toLowerCase() < b.term.toLowerCase() ? -1 : 1;
    return sortAZ ? r : -r;
  });
  document.getElementById('countEl').textContent = filtered.length;
  if(!filtered.length){
    document.getElementById('content').innerHTML = '<div class="empty-msg show">Geen begrippen gevonden voor je zoekopdracht.</div>';
    return;
  }
  var groups = {};
  var order = [];
  for(var i=0;i<filtered.length;i++){
    var t = filtered[i];
    var letter = t.term[0].toUpperCase();
    if(!groups[letter]){ groups[letter]=[]; order.push(letter); }
    groups[letter].push(t);
  }
  if(!sortAZ) order.reverse();
  var html = '';
  for(var li=0;li<order.length;li++){
    var letter = order[li];
    var terms = groups[letter];
    html += '<div class="alpha-group"><div class="alpha-head">'+letter+'</div>';
    for(var ti=0;ti<terms.length;ti++){
      var t = terms[ti];
      var cc = CH_COLORS[t.ch] || '#4f8ef7';
      html += '<div class="term-card" id="tc_'+t.id+'">';
      html += '<div class="term-header" onclick="toggleTerm(\'tc_'+t.id+'\')">';
      html += '<div class="term-dot" style="background:'+cc+'"></div>';
      html += '<div class="term-name">'+t.term+'</div>';
      html += '<span class="term-ch" style="background:'+cc+'22;color:'+cc+'">H.'+t.ch+'</span>';
      if(t.also) html += '<span class="term-also-preview">'+t.also+'</span>';
      html += '<span class="term-arrow">&#9658;</span>';
      html += '</div>';
      html += '<div class="term-body">';
      html += '<div class="term-def">'+t.def+'</div>';
      if(t.also) html += '<div class="term-also"><strong>Ook bekend als:</strong> '+t.also+'</div>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
  if(q) openAll();
}

function toggleTerm(id){
  var el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function openAll(){
  var cards = document.querySelectorAll('.term-card');
  for(var i=0;i<cards.length;i++) cards[i].classList.add('open');
}

init();
</script>
</body>
</html>
